<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>钉钉接入配置</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet" />
  </head>
  <body>
    <main class="container py-4">
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-4">
        <div>
          <h1 class="h3 mb-1">钉钉接入配置</h1>
          <div class="text-secondary small">
            {% if config %}
              当前状态：已配置
            {% else %}
              当前状态：未配置
            {% endif %}
          </div>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">返回首页</a>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <form id="dingtalk-form" class="row g-3">
            <div class="col-12">
              <label for="access-token" class="form-label">Access Token</label>
              <input
                type="text"
                class="form-control"
                id="access-token"
                placeholder="请输入 access_token"
                value="{{ config.access_token if config else '' }}"
                required
              />
            </div>
            <div class="col-12">
              <label for="secret" class="form-label">Secret</label>
              <input
                type="password"
                class="form-control"
                id="secret"
                placeholder="请输入 secret"
                value="{{ config.secret if config else '' }}"
                required
              />
              <div class="form-text">用于机器人加签，建议妥善保管。</div>
            </div>
            <div class="col-12">
              <label for="alert-days" class="form-label">告警天数</label>
              <input
                type="number"
                class="form-control"
                id="alert-days"
                min="1"
                max="365"
                value="{{ config.alert_days if config and config.alert_days is not none else alert_days_default }}"
                required
              />
              <div class="form-text">当证书剩余天数 ≤ 该值时发送告警。</div>
            </div>
            <div class="col-12">
              <label for="test-msg" class="form-label">测试消息</label>
              <input
                type="text"
                class="form-control"
                id="test-msg"
                placeholder="例如：SSL Monitor 测试消息"
                value="SSL Monitor 测试消息"
              />
            </div>
            <div class="col-12 d-grid gap-2">
              <button type="submit" class="btn btn-primary">保存配置</button>
              <button type="button" class="btn btn-outline-primary" id="test-send">
                发送测试消息
              </button>
            </div>
          </form>
          <div id="form-msg" class="alert mt-3 d-none" role="alert"></div>
        </div>
      </div>
    </main>

    <script src="{{ url_for('static', filename='dingtalk.js') }}"></script>
  </body>
</html>
